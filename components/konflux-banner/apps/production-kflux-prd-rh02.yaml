apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: konflux-banner-production-kflux-prd-rh02
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/testcara/konflux-banner.git
    targetRevision: main
    path: deploy/production/kflux-prd-rh02
  destination:
    server: https://kubernetes.default.svc
    namespace: konflux-banner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
